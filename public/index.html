<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#667eea">
  <title>8Trax - Upload with Progress</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 13px;
      color: #374151;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      padding: 24px;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
    }
    
    /* Progress Bar */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin: 16px 0;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }
    
    .upload-list {
      margin-top: 16px;
    }
    
    .upload-item {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .upload-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .upload-filename {
      font-weight: 600;
      font-size: 13px;
    }
    
    .upload-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #667eea;
      color: white;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      z-index: 1100;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    
    .beat-card {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .beat-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    audio {
      width: 100%;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="card">
      <h1>🎵 8Trax Studio</h1>
      <p>Upload your beats with real-time progress</p>
    </div>
    
    <!-- Auth Section -->
    <div class="card" id="authCard">
      <div id="authButtons">
        <button onclick="showLoginModal()" style="margin-right: 10px;">Login</button>
        <button onclick="showRegisterModal()" class="btn-primary">Sign Up</button>
      </div>
      <div id="userInfo" style="display: none;">
        <p>Welcome, <strong id="userName"></strong>!</p>
        <button onclick="logout()" class="btn-danger" style="width: auto; padding: 8px 16px;">Logout</button>
      </div>
    </div>
    
    <!-- Upload Form -->
    <div class="card">
      <h3>📤 Upload New Beat</h3>
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="beatTitle" placeholder="My awesome beat">
      </div>
      <div class="form-group">
        <label>Genre</label>
        <select id="beatGenre">
          <option value="Hip Hop">Hip Hop</option>
          <option value="R&B">R&B</option>
          <option value="Pop">Pop</option>
          <option value="Electronic">Electronic</option>
        </select>
      </div>
      <div class="form-group">
        <label>BPM *</label>
        <input type="number" id="beatBpm" placeholder="120">
      </div>
      <div class="form-group">
        <label>Tags</label>
        <input type="text" id="beatTags" placeholder="chill, trap, melodic">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="beatDescription" rows="3" placeholder="Describe your beat..."></textarea>
      </div>
      <div class="form-group">
        <label>Audio File * (Max 100MB)</label>
        <input type="file" id="beatFile" accept="audio/*">
        <small id="fileInfo" style="font-size: 11px; color: #6b7280;"></small>
      </div>
      <button id="uploadBtn" class="btn-primary">Upload Beat</button>
    </div>
    
    <!-- Active Uploads -->
    <div class="card" id="activeUploadsCard" style="display: none;">
      <h3>⏳ Active Uploads</h3>
      <div id="uploadsList"></div>
    </div>
    
    <!-- Beats List -->
    <div class="card">
      <h3>🎧 Recent Beats</h3>
      <div id="beatsList"></div>
    </div>
  </div>
  
  <!-- Upload Progress Modal -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Uploading...</h3>
        <button class="modal-close" id="closeUploadModalBtn">&times;</button>
      </div>
      <div>
        <p><strong id="modalFileName"></strong></p>
        <div class="progress-bar">
          <div id="modalProgressFill" class="progress-fill"></div>
        </div>
        <div class="progress-stats">
          <span id="modalPercentage">0%</span>
          <span id="modalSpeed">0 MB/s</span>
          <span id="modalTimeRemaining">--</span>
        </div>
        <button id="cancelUploadBtn" class="btn-danger" style="width: 100%; margin-top: 16px;">Cancel Upload</button>
      </div>
    </div>
  </div>
  
  <!-- Login Modal -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Login</h3>
        <button class="modal-close" onclick="closeModal('loginModal')">&times;</button>
      </div>
      <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; margin-bottom: 12px;">
      <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; margin-bottom: 12px;">
      <button onclick="login()" class="btn-primary">Login</button>
    </div>
  </div>
  
  <!-- Register Modal -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Register</h3>
        <button class="modal-close" onclick="closeModal('registerModal')">&times;</button>
      </div>
      <input type="text" id="regUsername" placeholder="Username" style="width: 100%; margin-bottom: 12px;">
      <input type="email" id="regEmail" placeholder="Email" style="width: 100%; margin-bottom: 12px;">
      <input type="text" id="regDisplayName" placeholder="Display Name" style="width: 100%; margin-bottom: 12px;">
      <input type="password" id="regPassword" placeholder="Password" style="width: 100%; margin-bottom: 12px;">
      <button onclick="register()" class="btn-primary">Register</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
